name: server-mcp-pr

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths-ignore:
      - src/Server.Api/**
      - .devcontainer/**
      - .vscode/**
      - .idea/**
      - docs/**
      - README.md

env:
  DOTNET_NOLOGO: true

jobs:
  build:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-slim

    permissions:
      pull-requests: write
      contents: read
      actions: read
      security-events: write

    steps:
      - uses: actions/checkout@v6.0.2

      - name: "Setup .NET"
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: "Dependency review"
        uses: actions/dependency-review-action@v5
        with:
          license-check: true
          vulnerability-check: true
          comment-summary-in-pr: on-failure

      - name: "Restore tools"
        run: dotnet tool restore

      - name: "Restore dependencies"
        run: dotnet restore

      - name: "Publish server-mcp (linux-x64, compile gate)"
        run: dotnet publish src/Server.Mcp/Server.Mcp.csproj -c Release --no-restore -r linux-x64

      - name: "Generate SBOM"
        uses: anchore/sbom-action@v0.24.0
        with:
          path: src/Server.Mcp/bin/Release/net10.0/linux-x64/publish
          format: spdx-json
          output-file: ${{ runner.temp }}/sbom.spdx.json
          artifact-name: sbom-server-mcp.spdx.json

      - name: "Scan SBOM"
        id: scan
        uses: anchore/scan-action@v7.4.0
        with:
          sbom: ${{ runner.temp }}/sbom.spdx.json
          severity-cutoff: critical
          fail-build: false
          only-fixed: true

      - name: "Upload SARIF"
        if: ${{ !cancelled() && steps.scan.outputs.sarif != '' && github.event.pull_request.head.repo.fork == false }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: server-mcp

      - name: "Pack server-mcp (no push)"
        run: dotnet pack src/Server.Mcp/Server.Mcp.csproj -c Release --no-restore -o ${{ runner.temp }}
