name: server-mcp

on:
  push:
    branches:
      - main
    tags:
      - mcp-*
    paths-ignore:
      - src/Server.Api/**
      - .devcontainer/**
      - .vscode/**
      - .idea/**
      - docs/**
      - README.md

env:
  DOTNET_NOLOGO: true

jobs:
  build:
    runs-on: ubuntu-slim

    permissions:
      packages: write
      contents: read
      actions: read
      security-events: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          filter: tree:0
          lfs: false

      - name: "Setup .NET"
        uses: actions/setup-dotnet@v5.4.0
        with:
          dotnet-version: 10.0.x

      - name: "Restore tools"
        run: dotnet tool restore

      - name: "Restore dependencies"
        run: dotnet restore

      - name: "Resolve debug symbol props (embed on untagged builds)"
        id: props
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "extra=" >> "$GITHUB_OUTPUT"
          else
            echo "extra=-p:DebugType=embedded" >> "$GITHUB_OUTPUT"
          fi

      - name: "Publish server-mcp (linux-x64, compile gate)"
        run: dotnet publish src/Server.Mcp/Server.Mcp.csproj -c Release --no-restore -r linux-x64 ${{ steps.props.outputs.extra }}

      - name: "Generate SBOM"
        uses: anchore/sbom-action@v0.24.0
        with:
          path: src/Server.Mcp/bin/Release/net10.0/linux-x64/publish
          format: spdx-json
          output-file: ${{ runner.temp }}/sbom.spdx.json
          artifact-name: sbom-server-mcp.spdx.json

      - name: "Scan SBOM"
        id: scan
        uses: anchore/scan-action@v7.4.0
        with:
          sbom: ${{ runner.temp }}/sbom.spdx.json
          severity-cutoff: high
          fail-build: false

      - name: "Upload SARIF"
        if: ${{ !cancelled() && steps.scan.outputs.sarif != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: server-mcp

      - name: "Pack server-mcp"
        run: dotnet pack src/Server.Mcp/Server.Mcp.csproj -c Release --no-restore -o ${{ runner.temp }} ${{ steps.props.outputs.extra }}

      - name: "Push to GitHub Packages"
        run: dotnet nuget push "${{ runner.temp }}/*.nupkg" --api-key "${{ secrets.GITHUB_TOKEN }}" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --skip-duplicate
