name: server-api-pr

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - src/Server.Mcp/**
      - .devcontainer/**
      - .vscode/**
      - .idea/**
      - docs/**
      - README.md

env:
  DOTNET_NOLOGO: true

jobs:
  build:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-slim

    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v6.0.2

      - name: "Setup .NET"
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 10.0.x

      #TODO: find a up to date dotnet format action that supports recent updates
      # - name: "dotnet format"
      #   uses: jfversluis/dotnet-format@v1.0.9
      #   with:
      #     action: check
      #     only-changed-files: true
      #     fail-fast: true
      #     repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Dependency review"
        uses: actions/dependency-review-action@v4
        with:
          license-check: true
          vulnerability-check: true
          comment-summary-in-pr: on-failure

      - name: "Restore tools"
        run: dotnet tool restore

      - name: "Restore dependencies"
        run: dotnet restore

      - name: "Build server-api (linux-arm64)"
        run: dotnet build src/Server.Api/Server.Api.csproj --configuration Release --runtime linux-arm64 --no-restore

      - name: "Build server-api (linux-x64)"
        run: dotnet build src/Server.Api/Server.Api.csproj --configuration Release --runtime linux-x64 --no-restore

      - name: "Publish multi-arch container"
        run: dotnet publish src/Server.Api/Server.Api.csproj --configuration Release --no-build --no-restore /t:PublishContainer -p ContainerArchiveOutputPath=${{ runner.temp }}/ssms-mcp-api.tar.gz

      - name: Container SBOM
        uses: anchore/sbom-action@v0.24.0
        with:
          file: ${{ runner.temp }}/ssms-mcp-api.tar.gz
          artifact-name: ssms-mcp-api-oci.spdx.json

      - name: Scan SBOM
        uses: anchore/scan-action@v7.4.0
        with:
          sbom: ${{ runner.temp }}/ssms-mcp-api-oci.spdx.json
          fail-build: true
          severity-cutoff: high
