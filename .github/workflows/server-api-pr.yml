name: server-api-pr

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - src/Server.Mcp/**
      - .devcontainer/**
      - .vscode/**
      - .idea/**
      - docs/**
      - README.md

env:
  DOTNET_NOLOGO: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v6.0.2

      - name: "Setup .NET"
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 10.0.x

      #TODO: find a up to date dotnet format action that supports recent updates
      # - name: "dotnet format"
      #   uses: jfversluis/dotnet-format@v1.0.9
      #   with:
      #     action: check
      #     only-changed-files: true
      #     fail-fast: true
      #     repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Dependency review"
        uses: actions/dependency-review-action@v4
        with:
          license-check: true
          vulnerability-check: true
          comment-summary-in-pr: on-failure

      - name: "Restore dependencies"
        run: dotnet restore

      - name: "Restore tools"
        run: dotnet tool restore

      - name: "Build server-api"
        run: dotnet build src/Server.Api/Server.Api.csproj -c Release --no-restore

      - name: "Publish container"
        run: dotnet publish --configuration Release --no-build --os linux --arch x64 /t:PublishContainer -p ContainerArchiveOutputPath=${{ runner.temp }}/ssms-mcp-api.tar.gz

      - name: Anchore SBOM Action
        uses: anchore/sbom-action@v0.24.0
        id: oci-image
        with:
          file: ${{ runner.temp }}/ssms-mcp-api.tar.gz
