name: server-api-pr

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths-ignore:
      - src/Server.Mcp/**
      - .devcontainer/**
      - .vscode/**
      - .idea/**
      - docs/**
      - README.md

env:
  DOTNET_NOLOGO: true
  REGISTRY: ghcr.io
  IMAGE: herve-m/net-ssms-mcp

jobs:
  build:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - base: noble
            image: "mcr.microsoft.com/dotnet/aspnet:10.0-noble-chiseled-extra"
            suffix: ""
          - base: azurelinux
            image: "mcr.microsoft.com/dotnet/aspnet:10.0-azurelinux3.0-distroless-extra"
            suffix: "-azurelinux"

    steps:
      - uses: actions/checkout@v6.0.2

      - run: git fetch --depth=1 origin ${{ github.base_ref }}

      - name: "Dependency review"
        uses: actions/dependency-review-action@v5
        with:
          license-check: true
          vulnerability-check: true
          comment-summary-in-pr: on-failure

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4.1.0

      - name: "Docker metadata"
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          flavor: |
            latest=false
            suffix=${{ matrix.suffix }}
          tags: |
            type=ref,event=pr
            type=sha

      # Build amd64 and load locally so the PR can be scanned. No push.
      - name: "Build (amd64) for scan"
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: src/Server.Api/Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          build-args: |
            BASE_IMAGE=${{ matrix.image }}
            VERSION=0.0.0-pr.${{ github.event.pull_request.number }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.base }}
          cache-to: type=gha,mode=max,scope=${{ matrix.base }}

      - name: "Vulnerability scan (grype, fail on HIGH+)"
        uses: anchore/scan-action@v7.4.0
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          severity-cutoff: high
          fail-build: true

      # build arm64 as well for validation,
      - name: "Build all platforms (validation, no push)"
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: src/Server.Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            BASE_IMAGE=${{ matrix.image }}
            VERSION=0.0.0-pr.${{ github.event.pull_request.number }}
          cache-from: type=gha,scope=${{ matrix.base }}
          cache-to: type=gha,mode=max,scope=${{ matrix.base }}
