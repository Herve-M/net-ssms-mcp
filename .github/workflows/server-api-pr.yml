name: server-api-pr

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main
    paths-ignore:
      - src/Server.Mcp/**
      - .devcontainer/**
      - .vscode/**
      - .idea/**
      - docs/**
      - README.md

env:
  DOTNET_NOLOGO: true
  REGISTRY: ghcr.io
  IMAGE: herve-m/net-ssms-mcp

jobs:
  build:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read
      actions: read
      security-events: write

    services:
      # see: https://docs.docker.com/build/ci/github-actions/local-registry/
      registry:
        image: registry:2
        ports:
          - 5000:5000

    strategy:
      fail-fast: false
      matrix:
        include:
          - base: noble
            image: "mcr.microsoft.com/dotnet/aspnet:10.0-noble-chiseled-extra"
            suffix: ""
          - base: azurelinux
            image: "mcr.microsoft.com/dotnet/aspnet:10.0-azurelinux3.0-distroless-extra"
            suffix: "-azurelinux"

    steps:
      - uses: actions/checkout@v6.0.2

      - run: git fetch --depth=1 origin ${{ github.base_ref }}

      - name: "Dependency review"
        uses: actions/dependency-review-action@v5
        with:
          license-check: true
          vulnerability-check: true
          comment-summary-in-pr: on-failure

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4.1.0
        with:
          driver-opts: network=host

      # docker build --check
      - name: "Dockerfile build check"
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: src/Server.Api/Dockerfile
          call: check
          build-args: |
            BASE_IMAGE=${{ matrix.image }}
            VERSION=0.1.0-pr.${{ github.event.pull_request.number }}

      - name: "Build multi-arch -> local registry"
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: src/Server.Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          build-args: |
            BASE_IMAGE=${{ matrix.image }}
            VERSION=0.1.0-pr.${{ github.event.pull_request.number }}
          tags: localhost:5000/${{ env.IMAGE }}:pr-${{ github.event.pull_request.number }}-${{ matrix.base }}
          cache-from: type=gha,scope=${{ matrix.base }}
          cache-to: type=gha,mode=max,scope=${{ matrix.base }}

      - name: "Extract per-platform SBOM (SPDX)"
        run: |
          REF="localhost:5000/${{ env.IMAGE }}:pr-${{ github.event.pull_request.number }}-${{ matrix.base }}"
          docker buildx imagetools inspect "$REF" --format '{{ json (index .SBOM "linux/amd64").SPDX }}' > "${{ runner.temp }}/sbom.amd64.json"
          docker buildx imagetools inspect "$REF" --format '{{ json (index .SBOM "linux/arm64").SPDX }}' > "${{ runner.temp }}/sbom.arm64.json"

      - name: "Scan SBOM amd64 (grype, fail on HIGH+)"
        id: scan-amd64
        uses: anchore/scan-action@v7.4.0
        with:
          sbom: ${{ runner.temp }}/sbom.amd64.json
          severity-cutoff: high
          fail-build: false

      - name: "Upload amd64 SARIF"
        if: ${{ failure() && steps.scan-amd64.outputs.sarif != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan-amd64.outputs.sarif }}
          category: ${{ matrix.base }}-amd64

      - name: "Scan SBOM arm64 (grype, fail on HIGH+)"
        id: scan-arm64
        uses: anchore/scan-action@v7.4.0
        with:
          sbom: ${{ runner.temp }}/sbom.arm64.json
          severity-cutoff: high
          fail-build: false

      - name: "Upload arm64 SARIF"
        if: ${{ failure() && steps.scan-arm64.outputs.sarif != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan-arm64.outputs.sarif }}
          category: ${{ matrix.base }}-arm64
