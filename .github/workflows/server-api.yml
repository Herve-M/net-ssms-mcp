name: server-api

on:
  push:
    branches:
      - main
    tags:
      - api-*
    paths-ignore:
      - src/Server.Mcp/**
      - .devcontainer/**
      - .vscode/**
      - .idea/**
      - docs/**
      - README.md

env:
  DOTNET_NOLOGO: true
  REGISTRY: ghcr.io
  IMAGE: herve-m/net-ssms-mcp

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - base: noble
            image: "mcr.microsoft.com/dotnet/aspnet:10.0-noble-chiseled-extra"
            suffix: ""
          - base: azurelinux
            image: "mcr.microsoft.com/dotnet/aspnet:10.0-azurelinux3.0-distroless-extra"
            suffix: "-azurelinux"

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true
          filter: tree:0
          lfs: false

      - name: "Setup .NET"
        uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: 10.0.x

      - name: "Restore tools"
        run: dotnet tool restore

      - name: "Compute assembly version (MinVer)"
        id: minver
        # -t api- matches the project's MinVerTagPrefix; the minver-cli tool
        # does not read the .csproj property, so the prefix is passed here.
        run: echo "version=$(dotnet minver -t api-)" >> "$GITHUB_OUTPUT"

      - name: "Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4.1.0

      - name: "Log in to GHCR"
        uses: docker/login-action@v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Docker metadata"
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          flavor: |
            latest=auto
            suffix=${{ matrix.suffix }},onlatest=true
          # Release tags are 'api-X.Y.Z' (MinVerTagPrefix=api-), which is not
          # parseable as semver by metadata-action. So we feed MinVer's computed
          # version into the semver templating via value=, gated to tag events.
          tags: |
            type=semver,pattern={{version}},value=${{ steps.minver.outputs.version }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.minver.outputs.version }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=semver,pattern={{major}},value=${{ steps.minver.outputs.version }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=edge,branch=main
            type=sha

      # Phase 1 — build amd64 only and load locally so it can be scanned
      # BEFORE anything is published. Attestations are skipped here (they
      # require a push); the GHA cache is shared with the push phase.
      - name: "Build (amd64) for scan"
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: src/Server.Api/Dockerfile
          platforms: linux/amd64
          load: true
          build-args: |
            BASE_IMAGE=${{ matrix.image }}
            VERSION=${{ steps.minver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.base }}
          cache-to: type=gha,mode=max,scope=${{ matrix.base }}

      - name: "Generate SBOM (SPDX artifact)"
        uses: anchore/sbom-action@v0.24.0
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          format: spdx-json
          artifact-name: sbom-${{ matrix.base }}.spdx.json

      - name: "Vulnerability scan (grype, fail on HIGH+)"
        uses: anchore/scan-action@v7.4.0
        with:
          image: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}
          severity-cutoff: high
          fail-build: true

      # Phase 2 — gate passed: build the full multi-arch manifest list and
      # push it (BuildKit assembles the manifest automatically). amd64 layers
      # are reused from the scan phase via the GHA cache; arm64 is built fresh.
      - name: "Build & push multi-arch (with attestations)"
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: src/Server.Api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          sbom: true
          provenance: mode=max
          build-args: |
            BASE_IMAGE=${{ matrix.image }}
            VERSION=${{ steps.minver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=${{ matrix.base }}
          cache-to: type=gha,mode=max,scope=${{ matrix.base }}
